name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install ruff
        run: pip install ruff==0.4.4
      - name: Lint
        run: ruff check src/ tests/ demo/

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"
          # Install CPU-only PyTorch for CI
          pip install torch torchaudio --index-url https://download.pytorch.org/whl/cpu
      - name: Run tests
        run: pytest tests/ -v --tb=short -x
      - name: Check imports
        run: |
          python -c "from src.data.utils import EMOTION_MAP; print('OK:', EMOTION_MAP)"
          python -c "from src.models.prosody_heads import build_prosody_heads; h = build_prosody_heads(); print('ProsodyHeads OK:', h.count_parameters())"
          python -c "from src.evaluation.prosody import analyze_single_file; print('Prosody module OK')"
          python -c "from src.training.train import _compute_mel_spectrogram; import torch; m = _compute_mel_spectrogram(torch.randn(1, 22050)); print('Mel OK:', m.shape)"
